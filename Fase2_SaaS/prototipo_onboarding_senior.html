<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lisicki Litvin - Onboarding Senior</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; color: #001b3d; }
        .bg-ll-navy { background-color: #001b3d; }
        .step-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #e2e8f0; color: #94a3b8; }
        .step-circle.active { border-color: #001b3d; color: #001b3d; background: #f0f4f8; }
        .step-circle.completed { background: #001b3d; color: white; border-color: #001b3d; }
        .input-ll { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 0.95rem; transition: all 0.2s; }
        .input-ll:focus { outline: none; border-color: #001b3d; box-shadow: 0 0 0 3px rgba(0,27,61,0.05); }
        .btn-ll { background-color: #001b3d; color: white; padding: 14px 28px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
        .card-auth { max-width: 500px; margin: 80px auto; padding: 50px; border: 1px solid #f0f4f8; box-shadow: 0 20px 50px rgba(0,27,61,0.05); border-radius: 8px; }
    </style>
</head>
<body>

    <header class="py-6 px-10 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center">
            <div class="w-8 h-8 bg-ll-navy rounded flex items-center justify-center mr-3">
                <span class="text-white font-bold text-lg">L</span>
            </div>
            <h1 class="text-xl font-semibold tracking-tight">Lisicki Litvin <span class="text-slate-400 font-light">| Onboarding</span></h1>
        </div>
        <a href="#" class="text-sm font-bold text-slate-400 hover:text-ll-navy">VOLVER AL INICIO</a>
    </header>

    <div class="card-auth">
        <!-- STEPS INDICATOR -->
        <div class="flex justify-between mb-12 relative">
            <div class="absolute top-5 left-0 right-0 h-0.5 bg-slate-100 -z-10"></div>
            <div class="flex flex-col items-center gap-2">
                <div class="step-circle completed">1</div>
                <span class="text-[10px] font-bold uppercase tracking-wider">Identidad</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="step-circle active">2</div>
                <span class="text-[10px] font-bold uppercase tracking-wider">Empresa</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="step-circle">3</div>
                <span class="text-[10px] font-bold uppercase tracking-wider">Seguridad</span>
            </div>
        </div>

        <h2 class="text-3xl font-bold mb-2">Perfil Profesional</h2>
        <p class="text-slate-500 mb-10 text-sm leading-relaxed">Complete los datos de la firma o analista a cargo de las auditorías.</p>

        <form class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Razón Social / Analista</label>
                <input type="text" class="input-ll" placeholder="Ej: Perez & Asociados S.R.L.">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">CUIT de Facturación</label>
                <input type="text" class="input-ll" placeholder="30-XXXXXXXX-X">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Jurisdicción de Cabecera</label>
                <select class="input-ll appearance-none bg-white">
                    <option>Sede Central - CABA</option>
                    <option>Sede Central - PBA</option>
                </select>
            </div>
            
            <div class="pt-4">
                <button type="button" class="btn-ll">Siguiente Paso ➔</button>
            </div>
            
            <div class="text-center">
                <p class="text-xs text-slate-400">¿Ya tiene una cuenta? <a href="#" class="text-ll-navy font-bold underline">Iniciar Sesión</a></p>
            </div>
        </form>
    </div>

    <footer class="text-center py-10">
        <p class="text-[10px] text-slate-300 font-medium tracking-[0.2em] uppercase">Certificación de Seguridad Bancaria AES-256</p>
    </footer>

</body>
</html>
